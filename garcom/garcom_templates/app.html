<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2c78ac">
<link rel="manifest" href="/garcom/manifest.json">
<link rel="apple-touch-icon" href="/garcom/logo.png">
<title>Garçom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a2332;min-height:100vh;overflow-x:hidden}
:root{--primary:#2e86c1;--primary-dark:#2c78ac;--success:#1e8449;--danger:#c0392b;--warning:#d68910;--bg:#f0f2f5;--card:#fff;--border:#d5d8dc;--text:#1a2332;--muted:#6b7a8d}

/* ── Login ── */
#screen-login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#2c78ac,#1a4a72)}
.login-card{background:#fff;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:24px}
.login-logo img{max-width:140px;max-height:64px;margin-bottom:12px;object-fit:contain}
.login-logo h2{color:var(--primary);font-size:18px;font-weight:700;line-height:1.3}
.login-logo p{color:var(--muted);font-size:13px;margin-top:4px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--primary)}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.85}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}
.err{background:#fff0f0;color:var(--danger);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px;display:none}

/* ── App principal ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--primary-dark);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{height:32px;width:auto;object-fit:contain;filter:brightness(0) invert(1)}
.topbar-info h1{font-size:14px;font-weight:700;line-height:1.2}
.topbar-info .user{font-size:11px;opacity:.75}
.topbar .btn-sair{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;white-space:nowrap}

.content{flex:1;padding:16px;padding-bottom:80px}

/* ── Tabs ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:200}
.tabbtn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;gap:3px;transition:color .2s}
.tabbtn svg{width:22px;height:22px}
.tabbtn.active{color:var(--primary)}

/* ── Mesas ── */
.setor-titulo{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-bottom:4px}
.mesa-card{border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent}
.mesa-card:active{transform:scale(.95)}
.mesa-card.LIVRE{background:#d5f5e3;border-color:#1e8449;color:#1e8449}
.mesa-card.OCUPADA{background:#fadbd8;border-color:#c0392b;color:#c0392b}
.mesa-card.RESERVADA{background:#fef9e7;border-color:#d68910;color:#d68910}
.mesa-card .m-num{font-size:20px;font-weight:800}
.mesa-card .m-nome{font-size:10px;opacity:.8;margin-top:2px}
.mesa-card .m-total{font-size:11px;font-weight:600;margin-top:4px}
.mesa-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
.badge-LIVRE{background:#1e8449;color:#fff}
.badge-OCUPADA{background:#c0392b;color:#fff}
.badge-RESERVADA{background:#d68910;color:#fff}

/* ── Pedido ── */
.pedido-header{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.pedido-header h2{font-size:16px;font-weight:700;color:var(--text)}
.pedido-header p{font-size:13px;color:var(--muted);margin-top:2px}
.item-card{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.item-info{flex:1}
.item-nome{font-size:14px;font-weight:600}
.item-sub{font-size:12px;color:var(--muted);margin-top:2px}
.item-sub .obs{font-style:italic;color:#8e44ad}
.item-preco{font-size:15px;font-weight:700;color:var(--primary);white-space:nowrap}
.item-del{background:#fff0f0;border:none;color:var(--danger);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.total-bar{background:var(--primary);color:#fff;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.total-bar span{font-size:14px;opacity:.9}
.total-bar strong{font-size:20px}
.empty-state{text-align:center;padding:48px 16px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* ── Cardápio ── */
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 14px 12px 40px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;outline:none;background:#fff}
.search-box input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)}
.cat-titulo{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.produto-item{background:#fff;border-radius:10px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s}
.produto-item:active{border-color:var(--primary)}
.produto-item.sem-estoque{opacity:.55;cursor:not-allowed;background:#fafafa}
.produto-info{flex:1}
.produto-nome{font-size:14px;font-weight:600}
.produto-cat{font-size:12px;color:var(--muted);margin-top:2px}
.produto-estoque{font-size:11px;margin-top:2px;font-weight:600}
.produto-estoque.ok{color:#1e8449}
.produto-estoque.zero{color:var(--danger)}
.produto-preco{font-size:16px;font-weight:700;color:var(--primary);white-space:nowrap}

/* ── Modal quantidade ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:24px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:4px}
.modal .modal-preco{color:var(--primary);font-size:15px;font-weight:600;margin-bottom:20px}
.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.qty-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--primary);background:#fff;color:var(--primary);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700}
.qty-val{flex:1;text-align:center;font-size:26px;font-weight:800}
.obs-field{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;margin-bottom:16px;outline:none;resize:none}
.obs-field:focus{border-color:var(--primary)}
.modal-btns{display:flex;gap:10px}
.modal-btns .btn{flex:1}

/* ── Mesa selecionada header ── */
.mesa-sel-bar{background:#fff;border-radius:12px;padding:10px 14px;margin-bottom:12px;border:1.5px solid var(--primary);display:flex;align-items:center;justify-content:space-between}
.mesa-sel-bar span{font-size:14px;font-weight:700;color:var(--primary)}
.mesa-sel-bar small{font-size:12px;color:var(--muted)}
.mesa-sel-bar .btn-trocar{border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline}

/* ── Modal mesa ── */
.modal-mesa-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:24px}
.modal-mesa-bg.open{display:flex}
.modal-mesa{background:#fff;border-radius:16px;width:100%;max-width:340px;padding:24px}
.modal-mesa .mm-icon{font-size:40px;text-align:center;margin-bottom:8px}
.modal-mesa h3{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.modal-mesa .mm-status{text-align:center;font-size:13px;margin-bottom:20px;padding:4px 12px;border-radius:20px;display:inline-block}
.mm-status-wrap{text-align:center;margin-bottom:20px}
.mm-pessoas{margin-bottom:20px}
.mm-pessoas label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.mm-pessoas-row{display:flex;align-items:center;gap:12px;justify-content:center}
.mm-pessoas-row .qty-btn{width:40px;height:40px;font-size:20px}
.mm-pessoas-val{font-size:24px;font-weight:800;min-width:40px;text-align:center}
.mm-info{background:#f8f9fa;border-radius:10px;padding:12px;margin-bottom:20px;font-size:13px;color:var(--muted);text-align:center}

.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>

<!-- TELA LOGIN -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-logo">
      <img src="/garcom/logo.png" alt="Logo" id="login-logo-img" onerror="this.style.display='none'">
      <h2 id="login-empresa-nome">🍽️ Garçom</h2>
      <p>Acesse com seu usuário do sistema</p>
    </div>
    <div id="login-err" class="err"></div>
    <div class="field"><label>Usuário</label><input type="text" id="inp-login" placeholder="login" autocomplete="username"></div>
    <div class="field"><label>Senha</label><input type="password" id="inp-senha" placeholder="••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary" id="btn-entrar">Entrar</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <img src="/garcom/logo.png" alt="" class="topbar-logo" onerror="this.style.display='none'">
      <div class="topbar-info">
        <h1 id="topbar-empresa">Garçom</h1>
        <div class="user" id="topbar-user"></div>
      </div>
    </div>
    <button class="btn-sair" id="btn-sair">Sair</button>
  </div>

  <div class="content">
    <!-- Mesa selecionada (aparece nas tabs Pedido e Cardápio) -->
    <div id="mesa-sel-bar" class="mesa-sel-bar" style="display:none">
      <div>
        <span id="mesa-sel-label">Mesa —</span>
        <small id="mesa-sel-status"></small>
      </div>
      <button class="btn-trocar" id="btn-trocar-mesa">trocar mesa</button>
    </div>

    <!-- Tab Mesas -->
    <div id="tab-mesas" class="tab-content"></div>

    <!-- Tab Pedido -->
    <div id="tab-pedido" class="tab-content" style="display:none"></div>

    <!-- Tab Cardápio -->
    <div id="tab-cardapio" class="tab-content" style="display:none"></div>
  </div>

  <nav class="bottomnav">
    <button class="tabbtn active" data-tab="mesas" id="nav-mesas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Mesas
    </button>
    <button class="tabbtn" data-tab="pedido" id="nav-pedido">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      Pedido
    </button>
    <button class="tabbtn" data-tab="cardapio" id="nav-cardapio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Cardápio
    </button>
  </nav>
</div>

<!-- Modal confirmar mesa -->
<div class="modal-mesa-bg" id="modal-mesa-bg">
  <div class="modal-mesa">
    <div class="mm-icon" id="mm-icon">🪑</div>
    <h3 id="mm-titulo">Mesa —</h3>
    <div class="mm-status-wrap"><span class="mm-status" id="mm-status-badge"></span></div>
    <div id="mm-body-livre">
      <div class="mm-pessoas">
        <label>Número de pessoas</label>
        <div class="mm-pessoas-row">
          <button class="qty-btn" id="mm-menos">−</button>
          <div class="mm-pessoas-val" id="mm-pessoas-val">1</div>
          <button class="qty-btn" id="mm-mais">+</button>
        </div>
      </div>
      <div class="modal-btns">
        <button class="btn btn-outline" id="mm-cancelar">Cancelar</button>
        <button class="btn btn-success" id="mm-abrir">Abrir Mesa</button>
      </div>
    </div>
    <div id="mm-body-ocupada" style="display:none">
      <div class="mm-info" id="mm-info-ocupada"></div>
      <div class="modal-btns">
        <button class="btn btn-outline" id="mm-voltar">Voltar</button>
        <button class="btn btn-primary" id="mm-ver-pedido">Ver Pedido</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal quantidade -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-nome">Produto</h3>
    <div class="modal-preco" id="modal-preco">R$ 0,00</div>
    <div class="qty-row">
      <button class="qty-btn" id="qty-minus">−</button>
      <div class="qty-val" id="qty-val">1</div>
      <button class="qty-btn" id="qty-plus">+</button>
    </div>
    <textarea class="obs-field" id="modal-obs" rows="2" placeholder="Observação (opcional)..."></textarea>
    <div class="modal-btns">
      <button class="btn btn-outline" id="modal-cancel">Cancelar</button>
      <button class="btn btn-success" id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ── Estado ──────────────────────────────────────────────────
const S = {
  token:    null,
  nome:     '',
  mesa:     null,   // {id, numero, nome, setor, status, pedido_id, total}
  pedido:   null,   // {pedido:{}, itens:[]}
  cardapio: null,   // array de produtos
  tabAtual: 'mesas',
  mesaTimer: null,
  produtoSel: null,
  qtyVal: 1,
};

// ── API ──────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (S.token) opts.headers['Authorization'] = 'Bearer ' + S.token;
  if (body)    opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

function fmt(v) {
  return 'R$ ' + parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}

// ── Login ────────────────────────────────────────────────────
document.getElementById('btn-entrar').addEventListener('click', async () => {
  const login = document.getElementById('inp-login').value.trim();
  const senha = document.getElementById('inp-senha').value;
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  if (!login || !senha) { err.textContent = 'Preencha todos os campos.'; err.style.display='block'; return; }
  const btn = document.getElementById('btn-entrar');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  try {
    const r = await api('POST', '/login', {login, senha});
    S.token = r.token;
    S.nome  = r.nome;
    localStorage.setItem('garcom_token', r.token);
    localStorage.setItem('garcom_nome',  r.nome);
    iniciarApp();
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
  } finally {
    btn.innerHTML = 'Entrar';
    btn.disabled  = false;
  }
});
document.getElementById('inp-senha').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('btn-entrar').click(); });

// ── Sair ─────────────────────────────────────────────────────
document.getElementById('btn-sair').addEventListener('click', () => {
  S.token = null; S.nome = ''; S.mesa = null;
  localStorage.removeItem('garcom_token');
  localStorage.removeItem('garcom_nome');
  if (S.mesaTimer) clearInterval(S.mesaTimer);
  _pararPollProntos();
  _prontoVisto.clear(); _prontoFirstPoll = true;
  document.getElementById('app').style.display   = 'none';
  document.getElementById('screen-login').style.display = 'flex';
});

// ── Info empresa ──────────────────────────────────────────────
async function carregarInfo() {
  try {
    const r    = await fetch('/api/info');
    const info = await r.json();
    const nome = info.empresa || 'Garçom';
    document.getElementById('login-empresa-nome').textContent = nome;
    document.getElementById('topbar-empresa').textContent     = nome;
    document.title = nome + ' — Garçom';
  } catch (_) {}
}

// Carrega info da empresa mesmo antes do login (para mostrar no login screen)
carregarInfo();

// ── Init app ──────────────────────────────────────────────────
function iniciarApp() {
  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('app').style.display          = 'flex';
  document.getElementById('topbar-user').textContent    = '👤 ' + S.nome;
  carregarInfo();
  trocarTab('mesas');
  S.mesaTimer = setInterval(() => { if (S.tabAtual === 'mesas') renderMesas(); }, 5000);
  _iniciarPollProntos();
}

// ── Tabs ─────────────────────────────────────────────────────
document.querySelectorAll('.tabbtn').forEach(btn => {
  btn.addEventListener('click', () => trocarTab(btn.dataset.tab));
});
document.getElementById('btn-trocar-mesa').addEventListener('click', () => trocarTab('mesas'));

function trocarTab(tab) {
  S.tabAtual = tab;
  document.querySelectorAll('.tabbtn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';

  const barEl = document.getElementById('mesa-sel-bar');
  if (S.mesa && (tab === 'pedido' || tab === 'cardapio')) {
    barEl.style.display = 'flex';
    document.getElementById('mesa-sel-label').textContent = `Mesa ${S.mesa.numero} — ${S.mesa.nome}`;
    document.getElementById('mesa-sel-status').textContent = S.mesa.status;
  } else {
    barEl.style.display = 'none';
  }

  if (tab === 'mesas')    renderMesas();
  if (tab === 'pedido')   renderPedido();
  if (tab === 'cardapio') renderCardapio();
}

// ── Tab Mesas ─────────────────────────────────────────────────
async function renderMesas() {
  const el = document.getElementById('tab-mesas');
  try {
    const mesas = await api('GET', '/mesas');
    // Agrupar por setor
    const setores = {};
    mesas.forEach(m => { if (!setores[m.setor]) setores[m.setor] = []; setores[m.setor].push(m); });
    let html = '';
    for (const [setor, lista] of Object.entries(setores)) {
      html += `<div class="setor-titulo">${setor}</div><div class="mesas-grid">`;
      lista.forEach(m => {
        const totalStr = m.total > 0 ? fmt(m.total) : '';
        html += `<div class="mesa-card ${m.status}" data-id="${m.id}" onclick="selecionarMesa(${m.id})">
          <div class="m-num">${m.numero}</div>
          <div class="m-nome">${m.nome}</div>
          <span class="mesa-badge badge-${m.status}">${m.status}</span>
          ${totalStr ? `<div class="m-total">${totalStr}</div>` : ''}
        </div>`;
      });
      html += '</div>';
    }
    if (!mesas.length) html = '<div class="empty-state"><div class="icon">🪑</div><p>Nenhuma mesa cadastrada.</p></div>';
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

// ── Modal Mesa ────────────────────────────────────────────────
let _mesaSel = null;
let _mmPessoas = 1;

async function selecionarMesa(id) {
  try {
    const mesas = await api('GET', '/mesas');
    _mesaSel = mesas.find(m => m.id === id) || null;
    if (!_mesaSel) return;
    _abrirModalMesa(_mesaSel);
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

function _abrirModalMesa(m) {
  const livre    = m.status === 'LIVRE';
  const icone    = livre ? '🪑' : (m.status === 'RESERVADA' ? '📋' : '🍽️');
  const badgeBg  = livre ? '#1e8449' : (m.status === 'RESERVADA' ? '#d68910' : '#c0392b');
  document.getElementById('mm-icon').textContent       = icone;
  document.getElementById('mm-titulo').textContent     = `Mesa ${m.numero} — ${m.nome}`;
  const badge = document.getElementById('mm-status-badge');
  badge.textContent       = m.status;
  badge.style.background  = badgeBg;
  badge.style.color       = '#fff';
  badge.style.fontSize    = '12px';
  badge.style.fontWeight  = '700';
  badge.style.padding     = '3px 12px';
  badge.style.borderRadius= '20px';

  if (livre) {
    _mmPessoas = 1;
    document.getElementById('mm-pessoas-val').textContent = '1';
    document.getElementById('mm-body-livre').style.display   = 'block';
    document.getElementById('mm-body-ocupada').style.display = 'none';
  } else {
    const infoEl = document.getElementById('mm-info-ocupada');
    infoEl.textContent = m.total > 0
      ? `Pedido em aberto — Total: ${fmt(m.total)}`
      : 'Mesa com pedido aberto.';
    document.getElementById('mm-body-livre').style.display   = 'none';
    document.getElementById('mm-body-ocupada').style.display = 'block';
  }
  document.getElementById('modal-mesa-bg').classList.add('open');
}

document.getElementById('mm-menos').addEventListener('click', () => {
  if (_mmPessoas > 1) { _mmPessoas--; document.getElementById('mm-pessoas-val').textContent = _mmPessoas; }
});
document.getElementById('mm-mais').addEventListener('click', () => {
  _mmPessoas++;
  document.getElementById('mm-pessoas-val').textContent = _mmPessoas;
});
document.getElementById('mm-cancelar').addEventListener('click', () => {
  document.getElementById('modal-mesa-bg').classList.remove('open');
  _mesaSel = null;
});
document.getElementById('mm-voltar').addEventListener('click', () => {
  document.getElementById('modal-mesa-bg').classList.remove('open');
  _mesaSel = null;
});
document.getElementById('mm-ver-pedido').addEventListener('click', async () => {
  if (!_mesaSel) return;
  document.getElementById('modal-mesa-bg').classList.remove('open');
  const trocouMesa = !S.mesa || S.mesa.id !== _mesaSel.id;
  S.mesa = _mesaSel;
  if (trocouMesa) { _prontoVisto.clear(); _prontoFirstPoll = true; }
  if (!S.mesa.pedido_id) {
    try {
      const r = await api('POST', `/mesa/${S.mesa.id}/abrir`, {pessoas: 1});
      S.mesa.pedido_id = r.pedido_id;
    } catch(e) { alert('Erro: ' + e.message); return; }
  }
  trocarTab('pedido');
});
document.getElementById('mm-abrir').addEventListener('click', async () => {
  if (!_mesaSel) return;
  const btn = document.getElementById('mm-abrir');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  try {
    const r = await api('POST', `/mesa/${_mesaSel.id}/abrir`, {pessoas: _mmPessoas});
    _mesaSel.pedido_id = r.pedido_id;
    S.mesa = _mesaSel;
    _prontoVisto.clear(); _prontoFirstPoll = true;
    document.getElementById('modal-mesa-bg').classList.remove('open');
    trocarTab('pedido');
  } catch(e) {
    alert('Erro ao abrir mesa: ' + e.message);
  } finally {
    btn.innerHTML = 'Abrir Mesa';
    btn.disabled  = false;
  }
});

// ── Tab Pedido ────────────────────────────────────────────────
async function renderPedido() {
  const el = document.getElementById('tab-pedido');
  if (!S.mesa) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🪑</div><p>Selecione uma mesa na aba Mesas.</p></div>';
    return;
  }
  el.innerHTML = '<div class="loading">Carregando...</div>';
  try {
    const data = await api('GET', `/pedido/${S.mesa.pedido_id}/itens`);
    S.pedido = data;
    const itens = data.itens || [];
    let html = '';
    if (!itens.length) {
      html = '<div class="empty-state"><div class="icon">🍽️</div><p>Nenhum item lançado.<br>Vá para o Cardápio e adicione itens.</p></div>';
    } else {
      itens.forEach(it => {
        html += `<div class="item-card">
          <div class="item-info">
            <div class="item-nome">${it.produto_nome}</div>
            <div class="item-sub">
              ${it.quantidade} ${it.unidade} × ${fmt(it.preco_unitario)}
              ${it.obs ? `<span class="obs"> — ${it.obs}</span>` : ''}
            </div>
          </div>
          <div class="item-preco">${fmt(it.subtotal)}</div>
          <button class="item-del" onclick="removerItem(${it.id})">✕</button>
        </div>`;
      });
      const total = parseFloat(data.pedido.total || 0);
      html += `<div class="total-bar"><span>Total do pedido</span><strong>${fmt(total)}</strong></div>`;
    }
    html += `<div style="margin-top:14px"><button class="btn btn-outline" onclick="trocarTab('cardapio')" style="display:block;width:100%">+ Adicionar itens</button></div>`;
    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

async function removerItem(itemId) {
  if (!confirm('Remover este item?')) return;
  try {
    await api('DELETE', `/item/${itemId}`);
    renderPedido();
  } catch (e) {
    alert('Erro: ' + e.message);
  }
}

// ── Tab Cardápio ──────────────────────────────────────────────
async function renderCardapio() {
  const el = document.getElementById('tab-cardapio');
  if (!S.mesa) {
    el.innerHTML = '<div class="empty-state"><div class="icon">🪑</div><p>Selecione uma mesa antes de lançar itens.</p></div>';
    return;
  }
  if (S.cardapio) { renderListaCardapio(''); return; }
  el.innerHTML = '<div class="loading">Carregando cardápio...</div>';
  try {
    S.cardapio = await api('GET', '/cardapio');
    renderListaCardapio('');
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function renderListaCardapio(busca) {
  const el = document.getElementById('tab-cardapio');
  const lista = S.cardapio.filter(p =>
    !busca || p.nome.toLowerCase().includes(busca.toLowerCase()) ||
    p.categoria_nome.toLowerCase().includes(busca.toLowerCase())
  );
  // Agrupar por categoria
  const cats = {};
  lista.forEach(p => { if(!cats[p.categoria_nome]) cats[p.categoria_nome]=[]; cats[p.categoria_nome].push(p); });
  let html = `<div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" id="cardapio-busca" placeholder="Buscar produto..." value="${busca}" oninput="renderListaCardapio(this.value)">
  </div>`;
  for (const [cat, prods] of Object.entries(cats)) {
    html += `<div class="cat-titulo">${cat}</div>`;
    prods.forEach(p => {
      const semEstoque = (p.estoque != null && p.estoque <= 0);
      const estoqueHtml = p.estoque != null
        ? `<div class="produto-estoque ${semEstoque ? 'zero' : 'ok'}">${semEstoque ? '✗ Sem estoque' : `✓ ${p.estoque} ${p.unidade}`}</div>`
        : '';
      const click = semEstoque ? '' : `onclick="abrirModal(${p.id})"`;
      html += `<div class="produto-item${semEstoque ? ' sem-estoque' : ''}" ${click}>
        <div class="produto-info">
          <div class="produto-nome">${p.nome}</div>
          <div class="produto-cat">${p.unidade}</div>
          ${estoqueHtml}
        </div>
        <div class="produto-preco">${fmt(p.preco_venda)}</div>
      </div>`;
    });
  }
  if (!lista.length) html += '<div class="empty-state"><div class="icon">🔍</div><p>Nenhum produto encontrado.</p></div>';
  el.innerHTML = html;
  // Restaurar foco na busca se estava pesquisando
  if (busca) {
    const inp = document.getElementById('cardapio-busca');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

// ── Modal quantidade ───────────────────────────────────────────
function abrirModal(prodId) {
  S.produtoSel = S.cardapio.find(p => p.id === prodId);
  if (!S.produtoSel) return;
  if (S.produtoSel.estoque != null && S.produtoSel.estoque <= 0) return; // segurança extra
  S.qtyVal = 1;
  document.getElementById('modal-nome').textContent  = S.produtoSel.nome;
  document.getElementById('modal-preco').textContent = fmt(S.produtoSel.preco_venda);
  document.getElementById('qty-val').textContent     = '1';
  document.getElementById('modal-obs').value         = '';
  // Mostrar estoque disponível abaixo do preço
  const estoqueDisp = S.produtoSel.estoque != null
    ? `<small style="color:#6b7a8d;font-size:12px">Estoque: ${S.produtoSel.estoque} ${S.produtoSel.unidade}</small>`
    : '';
  document.getElementById('modal-preco').innerHTML =
    fmt(S.produtoSel.preco_venda) + (estoqueDisp ? '<br>' + estoqueDisp : '');
  document.getElementById('modal-bg').classList.add('open');
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('modal-bg').classList.remove('open');
});
document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
});
document.getElementById('qty-minus').addEventListener('click', () => {
  if (S.qtyVal > 1) { S.qtyVal--; document.getElementById('qty-val').textContent = S.qtyVal; }
});
document.getElementById('qty-plus').addEventListener('click', () => {
  const maxEstoque = S.produtoSel?.estoque ?? Infinity;
  if (S.qtyVal < maxEstoque) {
    S.qtyVal++;
    document.getElementById('qty-val').textContent = S.qtyVal;
  }
});

document.getElementById('modal-confirm').addEventListener('click', async () => {
  if (!S.mesa || !S.mesa.pedido_id) { alert('Selecione uma mesa primeiro.'); return; }
  const btn = document.getElementById('modal-confirm');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  try {
    const obs = document.getElementById('modal-obs').value.trim();
    await api('POST', `/pedido/${S.mesa.pedido_id}/item`, {
      produto_id: S.produtoSel.id,
      quantidade: S.qtyVal,
      obs,
    });
    document.getElementById('modal-bg').classList.remove('open');
    // Atualizar total na mesa
    const mesas = await api('GET', '/mesas');
    const m = mesas.find(x => x.id === S.mesa.id);
    if (m) S.mesa = m;
    trocarTab('pedido');
  } catch (e) {
    alert('Erro ao adicionar: ' + e.message);
  } finally {
    btn.innerHTML = 'Confirmar';
    btn.disabled  = false;
  }
});

// ── Notificação "Pedido Pronto" para o garçom ─────────────────
let _prontoCtx       = null;
let _prontoTimer     = null;
let _prontoFirstPoll = true;   // na 1ª coleta apenas registra, sem alertar
const _prontoVisto = new Set(); // IDs de itens PRONTO já alertados

function _getAudioCtx() {
  if (!_prontoCtx || _prontoCtx.state === 'closed')
    _prontoCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_prontoCtx.state === 'suspended') _prontoCtx.resume();
  return _prontoCtx;
}

function _tocarPronto() {
  try {
    const ctx = _getAudioCtx();
    const t0  = ctx.currentTime + 0.05;
    [[523,0.12],[659,0.12],[784,0.18],[1047,0.28]].forEach(([f,d], i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = f;
      const start = t0 + i * 0.17;
      gain.gain.setValueAtTime(0.6, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + d);
      osc.start(start); osc.stop(start + d + 0.01);
    });
  } catch(_) {}
}

function _vibrarPronto() {
  try { navigator.vibrate && navigator.vibrate([200, 100, 200, 100, 400]); } catch(_) {}
}

function _mostrarBannerPronto(itens) {
  const nomes = itens.map(i => `${i.produto_nome} (×${i.quantidade})`).join(', ');
  // Toast reutilizável
  let el = document.getElementById('garcom-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'garcom-toast';
    el.style.cssText = 'position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-120px);background:#1e8449;color:#fff;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:700;z-index:9999;transition:transform .4s;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:90vw;text-align:center';
    document.body.appendChild(el);
  }
  el.innerHTML = `✅ Pronto para servir!<br><span style="font-size:12px;font-weight:400;opacity:.9">${nomes}</span>`;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(-120px)'; }, 5000);
}

async function _pollProntos() {
  if (!S.token || !S.mesa || !S.mesa.pedido_id) return;
  try {
    const itens = await api('GET', `/pedido/${S.mesa.pedido_id}/prontos`);
    const novos = itens.filter(i => !_prontoVisto.has(i.id));
    if (_prontoFirstPoll) {
      // 1ª coleta: só registra os que já existiam — sem alertar
      novos.forEach(i => _prontoVisto.add(i.id));
      _prontoFirstPoll = false;
      return;
    }
    if (novos.length > 0) {
      novos.forEach(i => _prontoVisto.add(i.id));
      _tocarPronto();
      _vibrarPronto();
      _mostrarBannerPronto(novos);
    }
  } catch(_) {}
}

function _iniciarPollProntos() {
  if (_prontoTimer) clearInterval(_prontoTimer);
  _prontoTimer = setInterval(_pollProntos, 6000);
}

function _pararPollProntos() {
  if (_prontoTimer) { clearInterval(_prontoTimer); _prontoTimer = null; }
}

// ── Auto-login via localStorage ────────────────────────────────
(function() {
  const t = localStorage.getItem('garcom_token');
  const n = localStorage.getItem('garcom_nome');
  if (t) {
    S.token = t;
    S.nome  = n || '';
    iniciarApp();
  }
})();
